advisors:
  - name: default
    model: deepseek/deepseek-v4-pro
  - name: schema-guard
    model: deepseek/deepseek-v4-pro
    description: "Enforces FK integrity, migration idempotency, no string joins on DESE tables"
  - name: css-architect
    model: deepseek/deepseek-v4-pro
    description: "Enforces modular CSS architecture, no regressions to monolith, per-page loading"
  - name: security-auditor
    model: deepseek/deepseek-v4-pro
    description: "Enforces CSP, CSRF, SQL injection prevention, XSS hardening on every phase"
  - name: perf-watchdog
    model: deepseek/deepseek-v4-pro
    description: "Enforces query count limits, no N+1, cache usage, page weight budget"
  - name: deployment-guard
    model: deepseek/deepseek-v4-pro
    description: "Enforces .htaccess correctness, FTP-only constraint, LiteSpeed compatibility"
